name: Upstream Compatibility

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - name: lastlayer
            submodule: vendor/lastlayer
            adapter: adapters/lastlayer_adapter.py
          - name: piguard
            submodule: vendor/piguard
            adapter: adapters/piguard_adapter.py
          - name: llmguard
            submodule: vendor/llm-guard
            adapter: adapters/llmguard_adapter.py

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check for upstream updates
        id: check-update
        run: |
          cd ${{ matrix.tool.submodule }}
          git fetch origin
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main || git rev-parse origin/master)
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "Update available for ${{ matrix.tool.name }}"
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
            echo "${{ matrix.tool.name }} is up to date"
          fi

      - name: Update submodule to latest
        if: steps.check-update.outputs.update_available == 'true'
        run: |
          cd ${{ matrix.tool.submodule }}
          git checkout $(git rev-parse origin/main || git rev-parse origin/master)

      - name: Run adapter compatibility tests
        if: steps.check-update.outputs.update_available == 'true'
        id: compat-tests
        run: |
          pytest tests/compat/test_${{ matrix.tool.name }}_adapter.py -v --tb=short
        continue-on-error: true

      - name: Create issue on failure
        if: steps.compat-tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Upstream compatibility failure: ${{ matrix.tool.name }}`;
            const body = `## Upstream Compatibility Check Failed

            **Tool:** ${{ matrix.tool.name }}
            **Submodule:** ${{ matrix.tool.submodule }}
            **Adapter:** ${{ matrix.tool.adapter }}

            The adapter compatibility tests failed after updating to the latest upstream version.

            ### Next Steps
            1. Review the test failures in this workflow run
            2. Update the adapter to accommodate upstream changes
            3. Run \`scripts/update-upstream.sh\` locally to test fixes

            ### Workflow Run
            [View details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-compat'
            });

            const existingIssue = issues.data.find(i => i.title === title);
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['upstream-compat', 'automated']
              });
            }
